# 开发/本地构建用 Docker Compose 文件
# 默认从当前 build 目录读取 .env；从仓库根目录运行时请显式传入 --env-file build/.env。

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15
    container_name: pixishelf-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pixishelf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # 可选：容器化运行 Next.js 应用。默认开发模式下不启动，通常直接在宿主机 pnpm dev。
  app:
    profiles:
      - container-app
    build:
      context: ..
      dockerfile: build/Dockerfile
      target: production
    container_name: pixishelf-app
    ports:
      - "${PIXISHELF_HOST_PORT:-5430}:5430"  # Web 服务端口
      - "${PRISMA_STUDIO_HOST_PORT:-5555}:5555"  # Prisma Studio 端口
    env_file:
      - .env
    environment:
      # API 环境变量
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=20&pool_timeout=20
      SCAN_PATH: /app/data
      NEXT_PUBLIC_IMGPROXY_URL: http://127.0.0.1:${IMGPROXY_HOST_PORT:-5431}
      NEXT_PUBLIC_THUMBOR_VIDEO_URL: http://127.0.0.1:${THUMBOR_HOST_PORT:-5433}
    volumes:
      - "${PIXISHELF_DATA_PATH}:/app/data:cached"
    networks:
      - pixishelf-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m" # 单个日志文件最大 20MB
        max-file: "10"    # 最多保留 10 个日志文件

  scheduler:
    profiles:
      - scheduler
    image: curlimages/curl:latest
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PIXISHELF_INTERNAL_URL: ${PIXISHELF_INTERNAL_URL:-http://host.docker.internal:5430}
      SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-60}
    command: >
      sh -c 'while true; do
        curl -fsS -X POST -H "Authorization: Bearer $${INTERNAL_JOB_TOKEN}" "$${PIXISHELF_INTERNAL_URL}/api/internal/scheduler/tick" || true;
        sleep "$${SCHEDULER_TICK_SECONDS}";
      done'
    networks:
      - pixishelf-network

  # imgproxy 服务容器
  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    ports:
      - '${IMGPROXY_HOST_PORT:-5431}:5431' # 将 ImgProxy 的 8080 端口映射到宿主机
    volumes:
      # 关键：将存储原图的文件夹挂载到 ImgProxy 容器中
      - "${PIXISHELF_DATA_PATH}:/data:ro"
    environment:
      - IMGPROXY_BIND=:5431
      # 允许 ImgProxy 处理来自本地文件系统的图片
      - IMGPROXY_USE_FILESYSTEM=true
      # 设置 ImgProxy 可以访问的根目录
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/data
      - IMGPROXY_ENABLE_VIDEO_THUMBNAILS=true
      - IMGPROXY_MAX_SRC_FILE_SIZE=0
      - IMGPROXY_MAX_SRC_RESOLUTION=1000
    networks:
      - pixishelf-network
    restart: always

  thumbor:
    # 使用官方的 Thumbor 镜像
    build:
      context: ..
      dockerfile: build/thumbor/Dockerfile
  # 给我们自己构建的镜像起个名字
    image: thumbor-video:latest
    container_name: thumbor_video
    restart: always
    ports:
      - "${THUMBOR_HOST_PORT:-5433}:80"
    volumes:
      - "${PIXISHELF_DATA_PATH}:/media:ro"  # 'ro' 表示只读，更安全
    environment:
      # 设置日志级别，方便调试
      - LOG_LEVEL=debug
      - QUALITY=80
      - WEBP_QUALITY=80
      - ALLOW_UNSAFE_URL=True
      - LOADER=thumbor.loaders.file_loader
      - FILE_LOADER_ROOT_PATH=/media
      - ENGINE=thumbor_video_engine.engines.video
      - GIF_ENGINE=thumbor_video_engine.engines.gif
      - FFMPEG_USE_GIFSICLE_ENGINE=True
      - FFMPEG_GIF_AUTO_WEBP=True
      - FFMPEG_GIF_AUTO_H265=True
      - APP_CLASS=thumbor_video_engine.app.ThumborServiceApp
      # 配置结果存储为文件系统
      - RESULT_STORAGE=thumbor_video_engine.result_storages.file_storage
      - RESULT_STORAGE_FILE_STORAGE_ROOT_PATH=/tmp/thumbor/result_storage
      - RESULT_STORAGE_STORES_UNSAFE=True
      - RESULT_STORAGE_EXPIRATION_SECONDS=0

      - FILTERS=['thumbor_video_engine.filters.format','thumbor_video_engine.filters.still']
volumes:
  postgres_data:

networks:
  pixishelf-network:
    driver: bridge
