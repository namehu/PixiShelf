# 生产部署用的 Docker Compose 文件
# 使用预构建的镜像，不进行本地构建
# 默认加载同目录下的 .env 文件

services:
  postgres:
    image: postgres:15
    container_name: pixishelf-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pixishelf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixishelf -d pixishelf"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # 统一的 Web + API 服务容器 - 使用预构建镜像
  app:
    image: docker.io/dockernamehu/pixishelf:${IMAGE_TAG:-latest}
    container_name: pixishelf-app
    ports:
      - "${PIXISHELF_HOST_PORT:-5430}:5430"   # Web 服务端口（Nginx）
    env_file:
      - .env
    environment:
      # 覆盖生产环境特定配置
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=20&pool_timeout=20
    volumes:
      # 挂载图片目录 - 根据实际需要调整路径
      - "${PIXISHELF_DATA_PATH:-./data}:/app/data:ro"  # 只读挂载图片目录
    networks:
      - pixishelf-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    image: curlimages/curl:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PIXISHELF_INTERNAL_URL: http://app:5430
      SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-60}
    command: >
      sh -c 'while true; do
        curl -fsS -X POST -H "Authorization: Bearer $${INTERNAL_JOB_TOKEN}" "$${PIXISHELF_INTERNAL_URL}/api/internal/scheduler/tick" || true;
        sleep "$${SCHEDULER_TICK_SECONDS}";
      done'
    networks:
      - pixishelf-network

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    ports:
      - '${IMGPROXY_HOST_PORT:-5431}:5431' # 将 ImgProxy 的 8080 端口映射到宿主机
    volumes:
      # 关键：将存储原图的文件夹挂载到 ImgProxy 容器中
      - "${PIXISHELF_DATA_PATH:-./data}:/data"
    environment:
      - IMGPROXY_BIND=:5431
      # 允许 ImgProxy 处理来自本地文件系统的图片
      - IMGPROXY_USE_FILESYSTEM=true
      # 设置 ImgProxy 可以访问的根目录
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/data
      - IMGPROXY_MAX_SRC_FILE_SIZE=0
      - IMGPROXY_MAX_SRC_RESOLUTION=1000
      # 开启并限制动图支持，防止 OOM (默认是 1 会变成静态图)
      - IMGPROXY_MAX_ANIMATION_FRAMES=256 # 允许最多处理 256 帧的动图（你可以根据实际业务调整，0 表示无限制但不推荐）
      - IMGPROXY_MAX_ANIMATION_RESOLUTION=50 # 动图所有帧的像素总和限制（单位：百万像素），防止超长超大动图卡死服务
      # === 稳定性与防 503 配置 ===
      # 增加允许在队列中等待的请求数，防止瞬时高并发导致请求被丢弃 (默认并发*10)
      - IMGPROXY_MAX_CLIENTS=2000
      # 防止大图处理时间过长导致网关认为超时
      - IMGPROXY_READ_TIMEOUT=30
      - IMGPROXY_WRITE_TIMEOUT=30
      - IMGPROXY_DOWNLOAD_TIMEOUT=30
      # 如果内存比较吃紧，可以开启积极的内存释放
      - IMGPROXY_FREE_MEMORY_INTERVAL=10
    networks:
      - pixishelf-network

  thumbor:
  # 给我们自己构建的镜像起个名字
    image: dockernamehu/pixishelf-thumbor:latest
    restart: always
    ports:
      - "${THUMBOR_HOST_PORT:-5433}:80"
    networks:
      - pixishelf-network
    volumes:
      - "${PIXISHELF_DATA_PATH:-./data}:/media:ro"  # 'ro' 表示只读，更安全
    environment:
      # 设置日志级别，方便调试
      # - LOG_LEVEL=debug
      - QUALITY=80
      - WEBP_QUALITY=80
      - ALLOW_UNSAFE_URL=True
      - LOADER=thumbor.loaders.file_loader
      - FILE_LOADER_ROOT_PATH=/media
      - ENGINE=thumbor_video_engine.engines.video
      - GIF_ENGINE=thumbor_video_engine.engines.gif
      - FFMPEG_USE_GIFSICLE_ENGINE=True
      - FFMPEG_GIF_AUTO_WEBP=True
      - FFMPEG_GIF_AUTO_H265=True
      - APP_CLASS=thumbor_video_engine.app.ThumborServiceApp
      - RESULT_STORAGE=thumbor_video_engine.result_storages.file_storage
      - FILTERS=['thumbor_video_engine.filters.format','thumbor_video_engine.filters.still']
volumes:
  postgres_data:

networks:
  pixishelf-network:
    driver: bridge
